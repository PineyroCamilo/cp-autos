<style>
    :root { 
        --red: #ef233c; 
        --green: #25D366; 
        --dark: #1d3557; 
        --glass: rgba(255, 255, 255, 0.9);
    }

    body { 
        font-family: 'Inter', sans-serif; 
        margin: 0; 
        background: #fdfdfd; 
        color: var(--dark); 
        line-height: 1.6;
    }

    /* --- NAVBAR (Igual al Inicio) --- */
    .navbar { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        padding: 15px 5%; 
        background: var(--glass);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(0,0,0,0.05); 
        position: sticky; 
        top: 0; 
        z-index: 1000; 
    }
    .navbar img { height: 45px; }
    .nav-links a { 
        margin-left: 20px; 
        text-decoration: none; 
        color: var(--dark); 
        font-weight: 600; 
        font-size: 13px;
        text-transform: uppercase;
    }

    .container {
        max-width: 900px;
        margin: 30px auto;
        padding: 0 20px;
    }

    .back-link { 
        display: inline-flex; 
        align-items: center;
        margin-bottom: 20px; 
        text-decoration: none; 
        color: #666; 
        font-size: 14px;
    }

    /* --- CARRUSEL --- */
    .carousel-container {
        position: relative;
        width: 100%;
        border-radius: 15px;
        overflow: hidden;
        background: #000;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .carousel-track {
        display: flex;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        scroll-behavior: smooth;
    }
    .carousel-track::-webkit-scrollbar { display: none; }

    .carousel-item {
        min-width: 100%;
        scroll-snap-align: start;
        background: #111;
        height: 500px;
    }
    .carousel-item img {
        width: 100%;
        height: 100%;
        object-fit: contain;
    }

    .nav-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: white;
        border: none;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        cursor: pointer;
        z-index: 10;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .btn-prev { left: 15px; }
    .btn-next { right: 15px; }

    /* --- FICHA TÉCNICA --- */
    .card {
        background: white;
        padding: 35px;
        border-radius: 15px;
        margin-top: 25px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        border: 1px solid #eee;
    }

    .price { color: var(--red); font-size: 34px; font-weight: 800; margin: 10px 0; }
    
    .specs {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        gap: 15px;
        margin: 25px 0;
        padding: 20px 0;
        border-top: 1px solid #eee;
        border-bottom: 1px solid #eee;
    }
    .spec-item span { display: block; font-size: 11px; color: #888; text-transform: uppercase; }
    .spec-item strong { font-size: 17px; }

    .btn-contact {
        display: block;
        background: var(--green);
        color: white;
        padding: 18px;
        text-align: center;
        text-decoration: none;
        border-radius: 10px;
        font-weight: 700;
        font-size: 18px;
    }

    /* --- FOOTER OSCURO --- */
    .footer-dark {
        background-color: #1d3557;
        color: white;
        padding: 60px 20px 30px;
        text-align: center;
        margin-top: 80px;
    }
    .footer-dark a { color: white; text-decoration: none; font-weight: 600; margin: 0 15px; }
    .copy { 
        margin-top: 30px; 
        font-size: 13px; 
        color: #adb5bd; 
        border-top: 1px solid rgba(255,255,255,0.1); 
        padding-top: 25px; 
    }

    @media (max-width: 600px) {
        .carousel-item { height: 350px; }
        .nav-btn { display: none; }
    }
</style>
</head>
